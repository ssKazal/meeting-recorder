name: Feature request
description: Suggest an idea
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation you're in, not just the feature you want.
      placeholder: "When I ..., I have to ... because ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like it to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I checked the [README](https://github.com/ssKazal/meeting-recorder#readme) and existing issues
          required: true
