name: Bug report
description: Something doesn't work
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Most issues are answered by the fields below, so
        please fill them in — especially the **session type**.

  - type: dropdown
    id: session
    attributes:
      label: Session type
      description: "Output of: `echo $XDG_SESSION_TYPE`"
      options:
        - x11
        - wayland
        - "I don't know"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        > **On `wayland`:** capture goes through the `xdg-desktop-portal`
        > ScreenCast API, so the desktop must grant screen sharing. If the video
        > is missing or black, please include the output of
        > `journalctl --user -u meeting-recorder` — a denied or crashing portal
        > makes the recorder fall back to audio-only.

  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of: `meeting-recorder --version`"
      placeholder: "meeting-recorder 0.1.1"
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Distribution and desktop
      placeholder: "Ubuntu 24.04, GNOME 46"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Join a Google Meet call
        2. Click Record on the popup
        3. ...
    validations:
      required: true

  - type: textarea
    id: status
    attributes:
      label: Output of `meeting-recorder status`
      render: shell
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Service log
      description: "`journalctl --user -u meeting-recorder -n 50 --no-pager`"
      render: shell
    validations:
      required: false
