name: APT repository

# Publishes a signed APT repository to the gh-pages branch so users can:
#   sudo apt install meeting-recorder
# and get updates through apt like any other package.
#
# Runs after a release is published; old versions are kept in the pool so they
# stay installable.
#
# Requires two repository secrets (see docs/APT-REPO.md):
#   GPG_PRIVATE_KEY  ASCII-armored private key used to sign the repo
#   GPG_PASSPHRASE   passphrase for that key (may be empty)
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.1)"
        required: true

permissions:
  contents: write

concurrency:
  group: apt-repo          # never let two runs race on gh-pages
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish APT repo
    runs-on: ubuntu-latest
    steps:
      - name: Work out the tag
        id: tag
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Build .deb
        env:
          MAINTAINER: ${{ vars.DEB_MAINTAINER }}
          HOMEPAGE: https://github.com/${{ github.repository }}
        run: ./packaging/build-deb.sh

      - name: Import signing key
        id: gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::error::GPG_PRIVATE_KEY secret is not set. See docs/APT-REPO.md."
            exit 1
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID="$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')"
          echo "key_id=$KEY_ID" >> "$GITHUB_OUTPUT"
          echo "Imported key $KEY_ID"

      - name: Check out existing repository (gh-pages)
        run: |
          # Keep previous versions in the pool. The branch may not exist yet.
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages --single-branch \
              "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" aptrepo
          else
            mkdir aptrepo && cd aptrepo && git init -q && git checkout -q -b gh-pages
          fi

      - name: Build the APT repository
        env:
          GPG_KEY_ID: ${{ steps.gpg.outputs.key_id }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./packaging/build-apt-repo.sh aptrepo dist/*.deb

      - name: Add a landing page
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          sed "s#__PAGES_URL__#${PAGES_URL}#g" packaging/apt-index.html > aptrepo/index.html
          # Stop GitHub Pages running the content through Jekyll.
          touch aptrepo/.nojekyll

      - name: Publish to gh-pages
        run: |
          cd aptrepo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote remove origin 2>/dev/null || true
          git remote add origin \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git add -A
          if git diff --cached --quiet; then
            echo "nothing changed"
          else
            git commit -m "APT repo: publish ${{ steps.tag.outputs.tag }}"
            git push origin gh-pages
          fi

      - name: Summary
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          {
            echo "### APT repository published"
            echo
            echo '```bash'
            echo "curl -fsSL ${PAGES_URL}/KEY.gpg | sudo gpg --dearmor -o /usr/share/keyrings/meeting-recorder.gpg"
            echo "echo \"deb [signed-by=/usr/share/keyrings/meeting-recorder.gpg] ${PAGES_URL} stable main\" | sudo tee /etc/apt/sources.list.d/meeting-recorder.list"
            echo "sudo apt update && sudo apt install meeting-recorder"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
